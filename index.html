<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Royal Cafe - Acceso</title>
  <link rel="icon" href="royal-cafe-logo.png" type="image/png">

  <style>
    :root{
      --bg: #f3f2f0;
      --card: #ffffff;
      --text: #111827;
      --muted:#6b7280;
      --danger:#dc2626;
      --primary:#111827;
      --border:#e5e7eb;
      --shadow: 0 10px 30px rgba(0,0,0,.10);
      --radius: 18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap{
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 28px 16px 32px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:18px;
      background: var(--card);
      border-radius: var(--radius);
      border:1px solid var(--border);
      padding:14px 18px;
      box-shadow: var(--shadow);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand img{
      height: 34px;
      width: 34px;
      border-radius: 12px;
      object-fit: cover;
      border:1px solid var(--border);
    }

    .brand h1{
      font-size: 18px;
      margin: 0;
      font-weight: 900;
      letter-spacing: .2px;
    }

    .userbar{
      display:flex;
      align-items:center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      flex-wrap:wrap;
    }

    .btn{
      border:1px solid var(--border);
      background:#fff;
      padding: 10px 16px;
      border-radius: 12px;
      cursor:pointer;
      font-weight: 800;
      font-size: 13px;
      width: auto;
    }

    .btn:disabled{ opacity:.55; cursor:not-allowed; }

    .btn-primary{
      background: var(--primary);
      color:#fff;
      border-color: var(--primary);
    }

    .card{
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      border: 1px solid var(--border);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .panel{
      border:1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      background:#fff;
    }

    .title{
      margin:0 0 8px 0;
      font-size: 18px;
      font-weight: 900;
    }

    .subtitle{
      margin:0 0 20px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      font-weight: 600;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom: 12px;
    }

    label{
      font-size: 12px;
      color: var(--muted);
      font-weight: 900;
    }

    input{
      padding: 12px 12px;
      border-radius: 12px;
      border:1px solid var(--border);
      outline:none;
      font-size: 14px;
      background:#fff;
    }
    input:focus{ border-color: #9ca3af; }

    .error{
      color: var(--danger);
      font-size: 13px;
      font-weight: 900;
      margin-top: 8px;
      display:none;
    }

    .divider{
      height:1px;
      background: var(--border);
      margin: 14px 0;
    }

    .small{
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .loader{
      display:none;
      margin-top:10px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
    }

    .auth-loader{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height: 260px;
      border:1px solid var(--border);
      border-radius: 14px;
      font-weight: 800;
      color: var(--muted);
      background:#fff;
    }

    .centros{
      display:flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .centro-btn{
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-weight: 900;
      font-size: 13px;
      transition: border-color .2s ease, background .2s ease;
      flex:1 1 calc(50% - 12px);
      text-align:center;
    }
    .centro-btn:hover{ border-color: #9ca3af; background:#f9fafb; }

    .notice{
      margin-top: 10px;
      color: var(--danger);
      font-weight: 900;
      font-size: 13px;
      display:none;
    }

    .panel.panel-hero{
      padding: 18px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    .panel.panel-hero .hero-img{
      display: block;
      margin: auto;
      width: min(480px, 100%);
      height: auto;
      object-fit: contain;
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    .opinat-inline{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size: 12px;
    }
    .opinat-logo{
      height: 14px;
      width: auto;
      vertical-align: middle;
      display:inline-block;
    }

    @media (max-width: 640px){
      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .centro-btn{
        flex:1 1 100%;
      }

      .panel {
        padding: 16px;
      }
    }

    @media (max-width: 480px){
      .wrap{
        padding: 16px 12px 24px;
      }

      .btn{
        width: 100%;
        justify-content:center;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
    <div class="brand">
      <img src="royal-cafe-logo.png" alt="Royal Cafe">
      <h1>Royal Cafe</h1>
    </div>

      <div class="userbar">
        <span id="userEmail"></span>
        <button class="btn" id="logoutBtn" style="display:none;">Cerrar sesión</button>
      </div>
    </div>

    <div class="card">
      <div class="grid">
        <div class="auth-loader" id="authLoader">Validando sesión...</div>
        <div class="panel" id="loginPanel" style="display:none;">
          <h2 class="title">Acceso</h2>
          <p class="subtitle">Inicia sesión para ver los centros habilitados.</p>

          <div class="field">
            <label for="loginEmail">Correo</label>
            <input id="loginEmail" type="email" placeholder="tu_correo@dominio.com" autocomplete="email">
          </div>

          <div class="field">
            <label for="loginPass">Contraseña</label>
            <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
          </div>

          <button class="btn btn-primary" id="loginBtn">Ingresar</button>
          <div id="loginError" class="error"></div>
          <div id="loginLoader" class="loader">Procesando...</div>

          <div class="divider"></div>
          <div class="small">
            <span class="opinat-inline">
              Desarrollado por
              <a href="https://www.opinat.com/" target="_blank" rel="noopener noreferrer">
                <img class="opinat-logo" src="LogoOpinat.png" alt="Opinat">
              </a>
            </span>
          </div>
        </div>

        <div class="panel panel-hero" id="heroPanel" style="display:none;">
        <img class="hero-img" src="royal-cafe-logo.png" alt="Royal Cafe">
        </div>

        <div class="panel" id="centrosPanel" style="display:none;">
          <h2 class="title">Selecciona un centro</h2>
          <p class="subtitle">Se mostrarán únicamente los centros autorizados para tu usuario.</p>

          <div id="centros-container" class="centros"></div>
          <div id="mensaje-permisos" class="notice"></div>

          <div class="small" style="margin-top:10px;">
            Si no aparece ningún botón, solicita a paula.fernandez@atheneasolutions.com el acceso.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    const loginPanel = document.getElementById("loginPanel");
    const centrosPanel = document.getElementById("centrosPanel");
    const heroPanel = document.getElementById("heroPanel");
    const authLoader = document.getElementById("authLoader");

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    const loginError = document.getElementById("loginError");
    const loginLoader = document.getElementById("loginLoader");

    const userEmailEl = document.getElementById("userEmail");

    const centrosContainer = document.getElementById("centros-container");
    const mensajePermisos = document.getElementById("mensaje-permisos");

    function setAuthLoader(on){
      authLoader.style.display = on ? "flex" : "none";
    }

    function showLogin() {
      setAuthLoader(false);
      loginPanel.style.display = "block";
      centrosPanel.style.display = "none";
      heroPanel.style.display = "block";
      logoutBtn.style.display = "none";
      userEmailEl.textContent = "";
      centrosContainer.innerHTML = "";
      hidePermMessage();
      setLoginError("");
    }

    function showCentros(email) {
      setAuthLoader(false);
      loginPanel.style.display = "none";
      centrosPanel.style.display = "block";
      heroPanel.style.display = "none";
      logoutBtn.style.display = "inline-block";
      userEmailEl.textContent = email;
    }

    function setLoginError(msg) {
      loginError.style.display = msg ? "block" : "none";
      loginError.textContent = msg || "";
    }

    function setLoader(on) {
      loginLoader.style.display = on ? "block" : "none";
      loginBtn.disabled = on;
    }

    function showPermMessage(msg) {
      mensajePermisos.style.display = "block";
      mensajePermisos.textContent = msg;
    }

    function hidePermMessage() {
      mensajePermisos.style.display = "none";
      mensajePermisos.textContent = "";
    }

    let firebaseConfig = null;
    setAuthLoader(true);

    try {
      const r = await fetch("/.netlify/functions/getConfig", { cache: "no-store" });
      const cfg = await r.json().catch(() => ({}));

      if (!r.ok) throw new Error(cfg?.error || "getConfig no respondió OK");

      firebaseConfig = cfg.firebaseConfig || cfg;
      console.log("✅ Firebase config cargado OK:", {
        projectId: firebaseConfig?.projectId,
        authDomain: firebaseConfig?.authDomain
      });
    } catch (e) {
      alert("No se pudo cargar la configuración de Firebase (getConfig).");
      console.error("❌ Error cargando Firebase config:", e);
      throw e;
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const INACTIVITY_LIMIT_MS = 30 * 60 * 1000;
    let inactivityTimer = null;

    function clearInactivityTimer(){
      if (inactivityTimer) {
        clearTimeout(inactivityTimer);
        inactivityTimer = null;
      }
    }

    async function forceLogoutByInactivity(){
      try{
        await signOut(auth);
      }catch(e){
        console.warn("Logout por inactividad falló:", e);
      }finally{
        showLogin();
      }
    }

    function resetInactivityTimer(){
      clearInactivityTimer();
      inactivityTimer = setTimeout(forceLogoutByInactivity, INACTIVITY_LIMIT_MS);
    }

    function attachActivityListeners(){
      const events = ["mousemove","mousedown","keydown","scroll","touchstart","click"];
      events.forEach(evt => window.addEventListener(evt, resetInactivityTimer, { passive: true }));
    }

    attachActivityListeners();

    async function cargarPermisosYRender(email) {
      const cleanEmail = (email || "").toLowerCase().trim();

      if (!cleanEmail) {
        showPermMessage("No se pudo leer el email del usuario logueado.");
        return;
      }

      let data;
      try {
        const resp = await fetch("/.netlify/functions/getPermissions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: cleanEmail })
        });

        data = await resp.json().catch(() => ({}));

        if (!resp.ok) {
          showPermMessage(data?.error || "No autorizado.");
          return;
        }
      } catch (e) {
        console.error("❌ Error llamando getPermissions:", e);
        showPermMessage("No se pudo consultar permisos (error de red).");
        return;
      }

      const perms = data?.permissions || {};
      const puedeDiagonal = perms.Clinica_Diagonal === true;
      const puedeSalus = perms.Clinica_Salus === true;

      if (!puedeDiagonal && !puedeSalus) {
        showPermMessage("No tienes permisos para visualizar ningún tablero.");
        return;
      }

      hidePermMessage();
      renderBotonesCentros({ puedeDiagonal, puedeSalus });
    }

    function renderBotonesCentros({ puedeDiagonal, puedeSalus }) {
      centrosContainer.innerHTML = "";

      if (puedeDiagonal) {
        const btn = document.createElement("button");
        btn.className = "centro-btn";
        btn.textContent = "Clínica Diagonal";
        btn.onclick = () => window.location.href = "center.html?center=diagonal";
        centrosContainer.appendChild(btn);
      }

      if (puedeSalus) {
        const btn = document.createElement("button");
        btn.className = "centro-btn";
        btn.textContent = "Clínica SALUS";
        btn.onclick = () => window.location.href = "center.html?center=salus";
        centrosContainer.appendChild(btn);
      }
    }

    loginBtn.addEventListener("click", async () => {
      setLoginError("");

      const email = document.getElementById("loginEmail").value.trim();
      const pass = document.getElementById("loginPass").value;

      if (!email || !pass) {
        setLoginError("Debes ingresar correo y contraseña.");
        return;
      }

      setLoader(true);

      try {
        console.log("Intentando login en Firebase:", {
          projectId: firebaseConfig?.projectId,
          authDomain: firebaseConfig?.authDomain,
          email
        });

        await signInWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        const code = e?.code || "auth/error";
        console.error("❌ Login error:", e);
        setLoginError(
          `No se pudo iniciar sesión (${code}). Verifica correo/contraseña y que el proyecto Firebase sea el correcto (${firebaseConfig?.projectId || "sin projectId"}).`
        );
      } finally {
        setLoader(false);
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      showLogin();
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        clearInactivityTimer();
        showLogin();
        return;
      }

      resetInactivityTimer();
      showCentros(user.email);
      await cargarPermisosYRender(user.email);
    });
  </script>
</body>
</html>
