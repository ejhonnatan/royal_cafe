<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Royal Cafe - Dashboard</title>
  <link rel="icon" href="royal-cafe-logo.png" type="image/png">

  <style>
    :root{
      --bg:#f3f2f0;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow:0 12px 30px rgba(0,0,0,.08);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: #111827;
      min-height: 100vh;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 18px;
      background:#ffffff;
      border-bottom:1px solid var(--border);
      position:sticky;
      top:0;
      z-index:20;
      gap:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      letter-spacing:.2px;
      color:#111827;
    }

    .brand img{
      width:32px;
      height:32px;
      border-radius:10px;
      background:#fff;
      border:1px solid var(--border);
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn{
      cursor:pointer;
      border:1px solid var(--border);
      background:#ffffff;
      color:#111827;
      padding:10px 14px;
      border-radius:12px;
      font-weight:900;
      font-size:13px;
    }

    .btn:hover{
      background:#f4f5f7;
    }

    .main{
      padding:18px;
      background:transparent;
      min-height:calc(100vh - 80px);
      max-width:1200px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .msg,
    .loader{
      padding:14px;
      border-radius:12px;
      margin:0 0 14px 0;
      font-weight:900;
    }

    .msg{
      display:none;
      background:rgba(220,38,38,.1);
      border:1px solid rgba(220,38,38,.25);
      color:#991b1b;
    }

    .loader{
      display:none;
      background:#fff;
      border:1px solid var(--border);
      color:#374151;
    }

    #reportContainer{
      width:100%;
      height:min(75vh, 720px);
      border-radius:18px;
      overflow:hidden;
      background:#fff;
      border:1px solid var(--border);
    }

    @media (max-width: 900px){
      .main{
        padding:14px;
      }

      #reportContainer{
        height:min(65vh, 620px);
      }
    }

    @media (max-width: 640px){
      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .actions .btn{
        width:100%;
        text-align:center;
      }
    }

    @media (max-width: 480px){
      .main{
        padding:12px;
      }

      #reportContainer{
        height:480px;
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">
      <img src="royal-cafe-logo.png" alt="Royal Cafe">
      <span id="centerTitle">Dashboard</span>
    </div>

    <div class="actions">
      <button class="btn" id="logoutBtn">Cerrar sesión</button>
    </div>
  </div>

  <main class="main">
    <div class="msg" id="msg"></div>
    <div class="loader" id="loader">Cargando dashboard...</div>
    <div id="reportContainer"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>

  <script type="module">
    // IDs del reporte Power BI (antes dependían del centro).
    // Si necesitas cambiar el reporte, ajusta estos 2 valores.
    const WORKSPACE_ID = "7230301b-540b-4f1a-b94d-c3ff22d4564d";
    const REPORT_ID = "46f47e04-a4b3-4295-98bd-d19ed0a315d8";

    const msg = document.getElementById("msg");
    const loader = document.getElementById("loader");
    const centerTitle = document.getElementById("centerTitle");
    const reportContainer = document.getElementById("reportContainer");

    function showError(text){
      msg.style.display = "block";
      msg.textContent = text;
      loader.style.display = "none";
    }

    function hideError(){
      msg.style.display = "none";
      msg.textContent = "";
    }

    function setLoading(on){
      loader.style.display = on ? "block" : "none";
      if (on) hideError();
    }

    function getQueryParam(name){
      const url = new URL(window.location.href);
      return (url.searchParams.get(name) || "").trim();
    }

    centerTitle.textContent = "Dashboard";

    let firebaseConfig = null;

    try {
      const r = await fetch("/.netlify/functions/getConfig", { cache: "no-store" });
      const cfg = await r.json().catch(() => ({}));

      if (!r.ok) {
        throw new Error(cfg?.error || "getConfig no respondió OK");
      }

      firebaseConfig = cfg.firebaseConfig || cfg;
    } catch (e) {
      showError("No se pudo cargar la configuración de Firebase.");
      throw e;
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("logoutBtn").onclick = async () => {
      await signOut(auth);
      window.location.href = "index.html";
    };

    const INACTIVITY_LIMIT_MS = 30 * 60 * 1000;
    let inactivityTimer = null;

    function clearInactivityTimer(){
      if (inactivityTimer) {
        clearTimeout(inactivityTimer);
        inactivityTimer = null;
      }
    }

    async function forceLogoutByInactivity(){
      try {
        await signOut(auth);
      } catch (e) {
        console.warn("Logout por inactividad falló:", e);
      } finally {
        window.location.href = "index.html";
      }
    }

    function resetInactivityTimer(){
      clearInactivityTimer();
      inactivityTimer = setTimeout(forceLogoutByInactivity, INACTIVITY_LIMIT_MS);
    }

    function attachActivityListeners(){
      const events = ["mousemove","mousedown","keydown","scroll","touchstart","click"];
      events.forEach(evt => window.addEventListener(evt, resetInactivityTimer, { passive: true }));
    }

    attachActivityListeners();

    async function pedirEmbedData(){
      const resp = await fetch("/.netlify/functions/getPowerBI", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ workspaceId: WORKSPACE_ID, reportId: REPORT_ID })
      });

      const data = await resp.json().catch(() => ({}));

      if (!resp.ok) {
        const extra = data?.raw ? ` | raw: ${data.raw}` : "";
        throw new Error((data?.error || "Error getPowerBI") + extra);
      }

      return data;
    }

    function embedReport(embedUrl, embedToken){
      powerbi.reset(reportContainer);

      const models = window["powerbi-client"].models;

      const config = {
        type: "report",
        tokenType: models.TokenType.Embed,
        accessToken: embedToken,
        embedUrl: embedUrl,
        settings: {
          panes: {
            filters: { visible: false },
            pageNavigation: { visible: true }
          },
          background: models.BackgroundType.Default
        }
      };

      powerbi.embed(reportContainer, config);
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        clearInactivityTimer();
        window.location.href = "index.html";
        return;
      }

      resetInactivityTimer();

      try {
        setLoading(true);

        const data = await pedirEmbedData();

        const embedToken = data.embedToken;
        const embedUrl = data.embedUrl;

        if (!embedToken || !embedUrl) {
          throw new Error("Respuesta incompleta: falta embedToken o embedUrl");
        }

        embedReport(embedUrl, embedToken);
        setLoading(false);

      } catch (e) {
        console.error(e);
        showError("No se pudo cargar el dashboard: " + e.message);
      }
    });
  </script>
</body>
</html>
